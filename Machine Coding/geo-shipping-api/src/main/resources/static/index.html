<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Request Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Simulating Location Request</h1>
  <p>Click the button below to request your location.</p>
  <button id="getLocationBtn">Login</button>
  <div id="locationInfo"></div>


  <h2>Send Order Request</h2>
  <p>Paste the JSON order request below and click "Process Order".</p>
  <textarea id="orderRequestJson" rows="10" cols="80"></textarea><br>
  <button id="sendOrderBtn">Process Order</button>
  <div id="orderResponse"></div>


  <script src="script.js"></script>
</body>
</html>
